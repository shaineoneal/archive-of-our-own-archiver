name: release

permissions: write-all

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, testing/* ]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: primary
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install dependencies
        run: npm ci
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WXT_API_CLIENT_ID: ${{ secrets.WXT_API_CLIENT_ID }}
          WXT_API_CLIENT_SECRET: ${{ secrets.WXT_API_CLIENT_SECRET }}
          WXT_API_EXTENSION_PUBLIC_KEY: ${{ secrets.WXT_API_EXTENSION_PUBLIC_KEY }}
          WXT_API_REDIRECT_URI: ${{ secrets.WXT_API_REDIRECT_URI }}
        run: export WXT_API_CLIENT_ID="${{ secrets.WXT_API_CLIENT_ID }}" && export WXT_API_CLIENT_SECRET="${{ secrets.WXT_API_CLIENT_SECRET }}" && export WXT_API_EXTENSION_PUBLIC_KEY="${{ secrets.WXT_API_EXTENSION_PUBLIC_KEY }}" && export WXT_API_REDIRECT_URI="${{ secrets.WXT_API_REDIRECT_URI }}" && npx semantic-release